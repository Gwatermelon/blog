baseURL = "https://blog-shf.pages.dev/"
locale = "zh-CN"
defaultContentLanguage = "zh"
title = "Ge Zhang · 技术笔记"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = true

[pagination]
  pagerSize = 8

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Ge Zhang · 技术笔记"
  description = "聚焦 AI 基础、大模型推理加速、投机推理与计算硬件的个人技术博客"
  author = "Ge Zhang"
  keywords = ["技术博客", "人工智能", "大模型推理", "投机推理", "AI 硬件"]
  defaultTheme = "auto"
  disableThemeToggle = false
  DateFormat = "2006 年 01 月 02 日"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowShareButtons = false
  ShowRssButtonInSectionTermList = true
  ShowPageNums = true
  displayFullLangName = true

  [params.homeInfoParams]
    Title = "你好，我是 Ge Zhang 👋"
    Content = "这里是我的 AI 系统研究工作台，聚焦 **大模型推理中的投机推理加速**，并持续整理 AI 基础原理、推理系统与计算硬件。把论文读深，把实验做实，也把研究过程变成可复用的知识。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Gwatermelon"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.label]
    text = "GZ / DEV"

  [params.assets]
    disableHLJS = true

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10
[[menu.main]]
  identifier = "research"
  name = "研究专题"
  url = "/research/"
  weight = 20
[[menu.main]]
  identifier = "papers"
  name = "论文研读"
  url = "/papers/"
  weight = 30
[[menu.main]]
  identifier = "todo"
  name = "Todo"
  url = "/todo/"
  weight = 40
[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 50
[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 60
[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 70

[minify]
  disableXML = true
  minifyOutput = true
